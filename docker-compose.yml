version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aioj}
      POSTGRES_USER: ${POSTGRES_USER:-aioj}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aiojpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aioj}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-aioj}:${POSTGRES_PASSWORD:-aiojpassword}@postgres:5432/${POSTGRES_DB:-aioj}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  judge-worker:
    build:
      context: ./judge
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-aioj}:${POSTGRES_PASSWORD:-aiojpassword}@postgres:5432/${POSTGRES_DB:-aioj}
      REDIS_URL: redis://redis:6379/0
      SANDBOX_IMAGE: aioj-sandbox:latest
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./judge:/app
      - /var/run/docker.sock:/var/run/docker.sock
    command: python -m app.worker

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

  # sandbox 이미지는 docker-compose build 시 사전 빌드
  sandbox-builder:
    build:
      context: ./sandbox
      dockerfile: Dockerfile
    image: aioj-sandbox:latest
    command: echo "Sandbox image built."

volumes:
  postgres_data:
